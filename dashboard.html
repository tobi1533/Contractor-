<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input type="file" id="image"><br><br>

<button onclick="uploadProduct()">Upload Product</button>

<script type="module">
import { db, storage } from './firebase.js';
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

window.uploadProduct = async function () {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const desc = document.getElementById('desc').value;
  const file = document.getElementById('image').files[0];

  if (!file) return alert("Select an image");

  // Upload image
  const file = document.getElementById("image").files[0];
const title = document.getElementById("title").value;
const price = document.getElementById("price").value;
const description = document.getElementById("description").value;

if (!file) {
  alert("Please select an image");
  return;
}

// Upload to Cloudinary
const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", "Tobifatai");

fetch("https://api.cloudinary.com/v1_1/dpaltarvh/image/upload", {
  method: "POST",
  body: formData
})
.then(res => res.json())
.then(data => {
  const imageUrl = data.secure_url;

  // Save to Firebase Firestore
  return addDoc(collection(db, "products"), {
    title: title,
    price: Number(price),
    description: description,
    imageUrl: imageUrl,
    createdAt: new Date()
  });
})
.then(() => {
  alert("Product uploaded successfully!");
})
.catch(err => {
  console.error(err);
  alert("Upload failed");
});
</script>

</body>
</html>
