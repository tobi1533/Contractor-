<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input type="file" id="images" multiple>
<div id="previewContainer"></div>
<button onclick="uploadImages()">Upload</button>
  
<script type="module">
import { db } from './firebase.js';
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.getElementById("uploadBtn").addEventListener("click", async () => {

  console.log("Button clicked");

  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const desc = document.getElementById('desc').value;
  const files = document.getElementById('image').files;

  let imageUrls = [];

  // ✅ Validation
  if (!name || !price || !desc) {
    alert("Please fill all fields");
    return;
  }

  if (files.length === 0) {
    alert("Please select at least one image");
    return;
  }

  try {

    // ✅ Upload images to Cloudinary
    for (let i = 0; i < files.length; i++) {

      const formData = new FormData();
      formData.append("file", files[i]);
      formData.append("upload_preset", "Tobifatai");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dpaltarvh/image/upload",
        {
          method: "POST",
          body: formData
        }
      );

      const data = await res.json();
      console.log("Cloudinary:", data);

      if (!data.secure_url) {
        alert("Image upload failed");
        return;
      }

      imageUrls.push(data.secure_url);
    }

    console.log("Images uploaded:", imageUrls);

    // ✅ Save to Firestore
    await addDoc(collection(db, "products"), {
      name: name,
      price: Number(price),
      description: desc,
      imageUrls: imageUrls,
      createdAt: new Date()
    });

    alert("✅ Product uploaded successfully!");

    // ✅ Clear inputs
    document.getElementById('name').value = "";
    document.getElementById('price').value = "";
    document.getElementById('desc').value = "";
    document.getElementById('image').value = "";

  } catch (err) {
    console.error("ERROR:", err);
    alert("❌ Upload failed. Check console.");
  }

});
</script>

</body>
</html>
