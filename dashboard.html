<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input type="file" id="image"><br><br>

<button onclick="uploadProduct()">Upload Product</button>

<script type="module">
import { db } from './firebase.js';
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.uploadProduct = async function () {

  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const desc = document.getElementById('desc').value;
  const file = document.getElementById('image').files[0];

  if (!name || !price || !desc) {
    alert("Fill all fields");
    return;
  }

  if (!file) {
    alert("Select an image");
    return;
  }

  try {
    // Upload to Cloudinary
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "Tobifatai");

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/dpaltarvh/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();
    const imageUrl = data.secure_url;

    // Save to Firestore
    await addDoc(collection(db, "products"), {
      name: name,
      price: Number(price),
      description: desc,
      imageUrl: imageUrl,
      createdAt: new Date()
    });

    alert("Product uploaded successfully!");

    // Clear inputs
    document.getElementById('name').value = "";
    document.getElementById('price').value = "";
    document.getElementById('desc').value = "";
    document.getElementById('image').value = "";

  } catch (err) {
    console.error(err);
    alert("Upload failed");
  }
};

</script>

</body>
</html>
