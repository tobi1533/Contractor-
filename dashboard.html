<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 30px;
    }

    .upload-section {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    .upload-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    #previewContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    #previewContainer img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #667eea;
      transition: transform 0.3s;
    }

    #previewContainer img:hover {
      transform: scale(1.05);
    }

    #uploadBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #uploadBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    #uploadBtn:active {
      transform: translateY(0);
    }

    .products-section {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .products-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .products-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .product-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      background: #f9f9f9;
    }

    .product-card:hover {
      border-color: #667eea;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
      transform: translateY(-4px);
    }

    .product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #e0e0e0;
    }

    .product-info {
      padding: 15px;
    }

    .product-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .product-price {
      font-size: 20px;
      color: #667eea;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .product-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-images-gallery {
      display: flex;
      gap: 5px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .product-images-gallery img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .product-images-gallery img:hover {
      border-color: #667eea;
    }

    .product-actions {
      display: flex;
      gap: 10px;
    }

    .delete-btn {
      flex: 1;
      padding: 10px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.3s;
    }

    .delete-btn:hover {
      background: #ff5252;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
    }

    .delete-btn:active {
      transform: translateY(0);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .empty-state p {
      font-size: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
      }

      .upload-section {
        position: static;
      }
    }

    @media (max-width: 600px) {
      .products-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- UPLOAD SECTION (YOUR ORIGINAL CODE) -->
  <div class="upload-section">
    <h2>Add Product</h2>
    <input id="name" placeholder="Product Name"><br><br>
    <input id="price" placeholder="Price"><br><br>
    <textarea id="desc" placeholder="Description"></textarea><br><br>
    <input type="file" id="images" multiple>
    <div id="previewContainer"></div>
    <br>
    <button id="uploadBtn">Upload</button>
  </div>

  <!-- PRODUCTS LIST SECTION (NEW) -->
  <div class="products-section">
    <h2>Your Products</h2>
    <div id="productsList" class="products-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading products...</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase.js';
import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   ELEMENTS
========================= */
const previewContainer = document.getElementById("previewContainer");
const imageInput = document.getElementById("images");
const productsList = document.getElementById("productsList");

/* =========================
   IMAGE PREVIEW (YOUR ORIGINAL CODE)
========================= */
imageInput.addEventListener("change", (e) => {
  const files = e.target.files;
  previewContainer.innerHTML = "";
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    img.style.width = "100px";
    img.style.height = "100px";
    img.style.objectFit = "cover";
    img.style.margin = "5px";
    img.style.borderRadius = "8px";
    previewContainer.appendChild(img);
  }
});

/* =========================
   LOAD PRODUCTS FROM FIRESTORE (NEW)
========================= */
async function loadProducts() {
  try {
    productsList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading products...</p></div>';
    
    const querySnapshot = await getDocs(collection(db, "products"));
    
    if (querySnapshot.empty) {
      productsList.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <div class="empty-state-icon">📦</div>
          <p>No products yet. Add your first product!</p>
        </div>
      `;
      return;
    }

    productsList.innerHTML = "";
    
    querySnapshot.forEach((doc) => {
      const product = doc.data();
      const productId = doc.id;
      
      const productCard = document.createElement("div");
      productCard.className = "product-card";
      
      const firstImage = product.imageUrls && product.imageUrls.length > 0 
        ? product.imageUrls[0] 
        : "https://via.placeholder.com/280x200?text=No+Image";
      
      const imagesGalleryHTML = product.imageUrls && product.imageUrls.length > 0
        ? `<div class="product-images-gallery">
             ${product.imageUrls.map(url => `<img src="${url}" alt="product" title="Click to view">`).join('')}
           </div>`
        : '';
      
      productCard.innerHTML = `
        <img src="${firstImage}" alt="${product.name}" class="product-image">
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">₦${Number(product.price).toLocaleString()}</div>
          <div class="product-desc">${product.description}</div>
          ${imagesGalleryHTML}
          <div class="product-actions">
            <button class="delete-btn" data-product-id="${productId}">🗑️ Delete</button>
          </div>
        </div>
      `;
      
      productsList.appendChild(productCard);
    });

    // Add delete event listeners
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const productId = e.target.dataset.productId;
        if (confirm("Are you sure you want to delete this product?")) {
          await deleteProduct(productId);
        }
      });
    });

  } catch (err) {
    console.error("Error loading products:", err);
    productsList.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <p>Error loading products. Please refresh.</p>
      </div>
    `;
  }
}

/* =========================
   DELETE PRODUCT (NEW)
========================= */
async function deleteProduct(productId) {
  try {
    await deleteDoc(doc(db, "products", productId));
    alert("Product deleted successfully!");
    loadProducts(); // Reload the list
  } catch (err) {
    console.error("Delete Error:", err);
    alert("Failed to delete product. Check console.");
  }
}

/* =========================
   UPLOAD PRODUCT (YOUR ORIGINAL CODE)
========================= */
document.getElementById("uploadBtn").addEventListener("click", async () => {
  console.log("Upload clicked");
  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const files = imageInput.files;
  let imageUrls = [];
  
  /* VALIDATION */
  if (!name || !price || !desc) {
    alert("Please fill all fields");
    return;
  }
  if (!files || files.length === 0) {
    alert("Please select at least one image");
    return;
  }
  
  try {
    /* =========================
       UPLOAD IMAGES TO CLOUDINARY
    ========================= */
    for (let i = 0; i < files.length; i++) {
      const formData = new FormData();
      formData.append("file", files[i]);
      formData.append("upload_preset", "Tobifatai");
      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dpaltarvh/image/upload",
        {
          method: "POST",
          body: formData
        }
      );
      const data = await res.json();
      console.log("Uploaded:", data);
      if (!data.secure_url) {
        throw new Error("Image upload failed");
      }
      imageUrls.push(data.secure_url);
    }
    /* =========================
       SAVE TO FIRESTORE
    ========================= */
    await addDoc(collection(db, "products"), {
      name,
      price: Number(price),
      description: desc,
      imageUrls,
      createdAt: new Date()
    });
    alert("Product uploaded successfully!");
    /* RESET FORM */
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("desc").value = "";
    imageInput.value = "";
    previewContainer.innerHTML = "";
    
    /* RELOAD PRODUCTS LIST */
    loadProducts();
  } catch (err) {
    console.error("Upload Error:", err);
    alert("Upload failed. Check console.");
  }
});

/* =========================
   INITIALIZE - LOAD PRODUCTS ON PAGE LOAD
========================= */
loadProducts();
</script>

</body>
</html>
