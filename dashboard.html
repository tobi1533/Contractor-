<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<input type="file" id="image"><br><br>

<button onclick="uploadProduct()">Upload Product</button>

<script type="module">
import { db, storage } from './firebase.js';
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

window.uploadProduct = async function () {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const desc = document.getElementById('desc').value;
  const file = document.getElementById('image').files[0];

  if (!file) return alert("Select an image");

  // Upload image
  const storageRef = ref(storage, 'products/' + file.name);
  await uploadBytes(storageRef, file);
  const imageUrl = await getDownloadURL(storageRef);

  // Save to Firestore
  await addDoc(collection(db, "products"), {
    name,
    price,
    desc,
    image: imageUrl,
    createdAt: new Date()
  });

  alert("Product uploaded!");
}
</script>

</body>
</html>
