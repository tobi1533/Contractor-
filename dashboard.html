<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>

<input type="file" id="images" multiple>
<div id="previewContainer"></div>

<br>
<button id="uploadBtn">Upload</button>

<script type="module">
import { db } from './firebase.js';
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   ELEMENTS
========================= */
const previewContainer = document.getElementById("previewContainer");
const imageInput = document.getElementById("images");

/* =========================
   IMAGE PREVIEW
========================= */
imageInput.addEventListener("change", (e) => {
  const files = e.target.files;

  previewContainer.innerHTML = "";

  for (let i = 0; i < files.length; i++) {
    const file = files[i];

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    img.style.width = "100px";
    img.style.height = "100px";
    img.style.objectFit = "cover";
    img.style.margin = "5px";
    img.style.borderRadius = "8px";

    previewContainer.appendChild(img);
  }
});

/* =========================
   UPLOAD PRODUCT
========================= */
document.getElementById("uploadBtn").addEventListener("click", async () => {

  console.log("Upload clicked");

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const files = imageInput.files;

  let imageUrls = [];

  /* VALIDATION */
  if (!name || !price || !desc) {
    alert("Please fill all fields");
    return;
  }

  if (!files || files.length === 0) {
    alert("Please select at least one image");
    return;
  }

  try {

    /* =========================
       UPLOAD IMAGES TO CLOUDINARY
    ========================= */
    for (let i = 0; i < files.length; i++) {

      const formData = new FormData();
      formData.append("file", files[i]);
      formData.append("upload_preset", "Tobifatai");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dpaltarvh/image/upload",
        {
          method: "POST",
          body: formData
        }
      );

      const data = await res.json();

      console.log("Uploaded:", data);

      if (!data.secure_url) {
        throw new Error("Image upload failed");
      }

      imageUrls.push(data.secure_url);
    }

    /* =========================
       SAVE TO FIRESTORE
    ========================= */
    await addDoc(collection(db, "products"), {
      name,
      price: Number(price),
      description: desc,
      imageUrls,
      createdAt: new Date()
    });

    alert("Product uploaded successfully!");

    /* RESET FORM */
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("desc").value = "";
    imageInput.value = "";
    previewContainer.innerHTML = "";

  } catch (err) {
    console.error("Upload Error:", err);
    alert("Upload failed. Check console.");
  }

});
</script>

</body>
</html>
