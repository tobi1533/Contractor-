  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #FF6B35;
      --primary-dark: #E55100;
      --secondary: #3498DB;
      --accent: #2ECC71;
      --dark: #1a1a2e;
      --darker: #0f1419;
      --light: #F5F5F5;
      --glass: rgba(255, 255, 255, 0.08);

    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      color: white;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52, 152, 219, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(46, 204, 113, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: ambientPulse 15s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(52, 152, 219, 0.03) 25%, rgba(52, 152, 219, 0.03) 26%, transparent 27%, transparent 74%, rgba(52, 152, 219, 0.03) 75%, rgba(52, 152, 219, 0.03) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(52, 152, 219, 0.03) 25%, rgba(52, 152, 219, 0.03) 26%, transparent 27%, transparent 74%, rgba(52, 152, 219, 0.03) 75%, rgba(52, 152, 219, 0.03) 76%, transparent 77%, transparent);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 2px solid rgba(255, 107, 53, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
    }

    .nav-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      margin: 0;
    }

    .hamburger {
      width: 50px;
      height: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
      position: relative;
      z-index: 1001;
    }

    .hamburger span {
      width: 25px;
      height: 2.5px;
      background: white;
      margin: 5px 0;
      display: block;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(12px, 12px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    .mobile-menu {
      position: fixed;
      top: 70px;
      right: -300px;
      width: 280px;
      height: calc(100vh - 70px);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 3px solid var(--primary);
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.4);

      z-index: 2000;
      padding: 30px 20px;
      overflow-y: auto;
    }

    .mobile-menu.active {

    }

    .menu-item {

      border: 2px solid rgba(255, 107, 53, 0.3);

      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      font-size: 14px;
    }

    .menu-item:hover {

    }

    .admin-login-btn {

    .admin-label {

      font-size: 12px;
      margin-top: 25px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    h2 {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 100px 20px 40px;
      color: #fff;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 2px;
      font-family: 'Playfair Display', serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #products {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 40px 20px 80px;
      gap: 30px;
    }

    .product {
      width: 220px;
      height: 360px;
      border: 2px solid rgba(255, 107, 53, 0.3);
      display: flex;
      flex-direction: column;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 250, 255, 0.9) 100%);

      transition: all 0.4s ease;

      overflow: hidden;

    .product:hover {
      transform: scale(1.03);

    .image-container {

      width: 100%;

      overflow: hidden;

      background: #f0f0f0;
    }

    .product-img {
      width: 100%;

      display: block;
      transition: 0.4s ease;
    }

    .image-counter {
      position: absolute;

    .product-info {

      justify-content: space-between;
    }

    .title {

    .desc {

      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;

      overflow: hidden;
    }

    .order-btn {
      width: 100%;
      padding: 10px 10px;
      background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .order-btn:hover {
      transform: translateY(-2px);

    }

    .sold-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #E74C3C;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 30;

    .product.sold .product-img {

    /* Contact Popup Styles */
    .contact-popup {

    .contact-label {

        font-size: 36px;

      }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
    }

    .modal-content {
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      position: relative;
    }

    .modal-image {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 10px;
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px 20px;
      cursor: pointer;
      font-size: 24px;
      border-radius: 8px;
    }

    .modal-prev { left: 20px; }
    .modal-next { right: 20px; }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: var(--primary);
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
    }

    /* Search Section Styles */
    .search-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto 50px;
      padding: 0 20px;
    }

    .search-box {
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      border: 2px solid rgba(255, 107, 53, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a2e;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .search-box:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 6px 25px rgba(255, 107, 53, 0.3);
    }

    .search-box::placeholder {
      color: #999;
    }

    .search-icon {
      position: absolute;
      right: 35px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      pointer-events: none;
      color: var(--primary);
    }

    .clear-search {
      position: absolute;
      right: 35px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #999;
      transition: all 0.3s ease;
      display: none;
      padding: 0;
    }

    .clear-search:hover {
      color: var(--primary);
    }

    .search-box:not(:placeholder-shown) ~ .clear-search {
      display: block;
    }

    .search-box:not(:placeholder-shown) ~ .search-icon {
      display: none;
    }

    .no-results {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
    }

    .no-results-emoji {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }
  </style>
</head>

    <img id="modalImage" class="modal-image" src="" alt="Product image">
    <button class="modal-nav modal-prev" id="prevBtn">&#10094;</button>
    <button class="modal-nav modal-next" id="nextBtn">&#10095;</button>
    <span class="modal-close" id="closeBtn">&times;</span>
    <div class="modal-counter">
      <span id="modalCounter"></span>

<script type="module">
let db = null;
let collection = null;
let getDocs = null;

try {
  const firebaseModule = await import('./firebase.js');
  db = firebaseModule.db;
  const firestoreModule = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  collection = firestoreModule.collection;
  getDocs = firestoreModule.getDocs;
} catch (error) {
  console.warn('Firebase not loaded - menu will still work:', error);
}

const OWNER_PHONE = "2347034447700";

const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  mobileMenu.classList.toggle('active');
});

document.addEventListener('click', (e) => {
  if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
    hamburger.classList.remove('active');
    mobileMenu.classList.remove('active');
  }
});

const container = document.getElementById("products");
const modal = document.getElementById("imageModal");
const modalImage = document.getElementById("modalImage");
const modalCounter = document.getElementById("modalCounter");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const closeBtn = document.getElementById("closeBtn");

let currentProductImages = [];
let currentImageIndex = 0;

function openImageGallery(images, index = 0) {
  currentProductImages = images.filter(url => url && url.trim() !== '');
  if (!currentProductImages.length) return;

  currentImageIndex = index;
  showImage();
  modal.style.display = "block";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.style.display = "none";
  document.body.style.overflow = "auto";
}

function changeImage(direction) {
  currentImageIndex += direction;

  if (currentImageIndex >= currentProductImages.length) {
    currentImageIndex = 0;
  } else if (currentImageIndex < 0) {
    currentImageIndex = currentProductImages.length - 1;
  }

  showImage();
}

function showImage() {
  if (currentProductImages.length > 0) {
    modalImage.src = currentProductImages[currentImageIndex];
    modalCounter.textContent = `${currentImageIndex + 1} / ${currentProductImages.length}`;
  }
}

prevBtn.addEventListener("click", () => changeImage(-1));
nextBtn.addEventListener("click", () => changeImage(1));
closeBtn.addEventListener("click", closeModal);

modal.addEventListener("click", (e) => {
  if (e.target === modal) {
    closeModal();
  }
});

document.addEventListener("keydown", (e) => {
  if (modal.style.display === "block") {
    if (e.key === "ArrowLeft") changeImage(-1);
    if (e.key === "ArrowRight") changeImage(1);
    if (e.key === "Escape") closeModal();
  }
});

async function loadProducts() {
  if (!db || !getDocs || !collection) {
    console.warn('Firebase not available - products cannot load');
    container.innerHTML = '<p style="text-align:center; color:white; padding:50px;">Please check Firebase configuration</p>';
    return;
  }

  const querySnapshot = await getDocs(collection(db, "products"));

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    const isSold = data.sold === true;

    let validImages = Array.isArray(data.imageUrls)
      ? data.imageUrls.filter(url => url && url.trim() !== '')
      : [];

    let mainImageHTML = "";

    if (validImages.length > 0) {
      const imageDataJson = JSON.stringify(validImages).replace(/"/g, '&quot;');

      mainImageHTML = `
        <div class="image-container" data-images="${imageDataJson}">
          <img src="${validImages[0]}" class="product-img" alt="${data.name || 'Product'}">
          ${validImages.length > 1 ? `<div class="image-counter">${validImages.length} photos</div>` : ''}
        </div>
      `;
    } else {
      mainImageHTML = `<div class="image-container"><div class="no-image">No image</div></div>`;
    }

    const productName = data.name || "Product";
    const productPrice = data.price || 0;

    const whatsappMessage = encodeURIComponent(
      `Hello, I'm interested in this product:\n\n📦 Product: ${productName}\n💰 Price: ₦${productPrice}\n\nPlease I would like to know more details.`
    );

    const whatsappLink = `https://wa.me/${OWNER_PHONE}?text=${whatsappMessage}`;

    container.innerHTML += `
      <div class="product ${isSold ? 'sold' : ''}">
        ${isSold ? `<div class="sold-badge">Sold</div>` : ''}
        ${mainImageHTML}

        <div class="product-info">
          <div>
            <div class="title">${productName}</div>
            <div class="price">₦${productPrice}</div>
          </div>

          <div class="desc">${data.description || ""}</div>

          ${
            isSold
              ? `<button class="order-btn" disabled>Sold Out</button>`
              : `
                <a
                  href="${whatsappLink}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="order-btn"
                  onclick="event.stopPropagation()"
                >
                  Order Now
                </a>
              `
          }
        </div>
      </div>
    `;
  });

  document.querySelectorAll('.image-container').forEach((container) => {

// Search functionality
const searchBox = document.getElementById('searchBox');
const clearSearchBtn = document.getElementById('clearSearchBtn');
let allProducts = []; // Store all products for searching

// Store products during load
const originalLoadProducts = loadProducts;
loadProducts = async function() {
  if (!db || !getDocs || !collection) {
    console.warn('Firebase not available - products cannot load');
    container.innerHTML = '<p style="text-align:center; color:white; padding:50px;">Please check Firebase configuration</p>';
    return;
  }

  const querySnapshot = await getDocs(collection(db, "products"));
  allProducts = []; // Reset products array

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    allProducts.push(data); // Store product data
    const isSold = data.sold === true;

    let validImages = Array.isArray(data.imageUrls)
      ? data.imageUrls.filter(url => url && url.trim() !== '')
      : [];

    let mainImageHTML = "";

    if (validImages.length > 0) {
      const imageDataJson = JSON.stringify(validImages).replace(/"/g, '&quot;');

      mainImageHTML = `
        <div class="image-container" data-images="${imageDataJson}">
          <img src="${validImages[0]}" class="product-img" alt="${data.name || 'Product'}">
          ${validImages.length > 1 ? `<div class="image-counter">${validImages.length} photos</div>` : ''}
        </div>
      `;
    } else {
      mainImageHTML = `<div class="image-container"><div class="no-image">No image</div></div>`;
    }

    const productName = data.name || "Product";
    const productPrice = data.price || 0;

    const whatsappMessage = encodeURIComponent(
      `Hello, I'm interested in this product:\n\n📦 Product: ${productName}\n💰 Price: ₦${productPrice}\n\nPlease I would like to know more details.`
    );

    const whatsappLink = `https://wa.me/${OWNER_PHONE}?text=${whatsappMessage}`;

    container.innerHTML += `
      <div class="product ${isSold ? 'sold' : ''}">
        ${isSold ? `<div class="sold-badge">Sold</div>` : ''}
        ${mainImageHTML}

        <div class="product-info">
          <div>
            <div class="title">${productName}</div>
            <div class="price">₦${productPrice}</div>
          </div>

          <div class="desc">${data.description || ""}</div>

          ${
            isSold
              ? `<button class="order-btn" disabled>Sold Out</button>`
              : `
                <a
                  href="${whatsappLink}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="order-btn"
                  onclick="event.stopPropagation()"
                >
                  Order Now
                </a>
              `
          }
        </div>
      </div>
    `;
  });

  document.querySelectorAll('.image-container').forEach((container) => {
    container.addEventListener('click', () => {
      const imagesJson = container.getAttribute('data-images');

      if (imagesJson) {
        const images = JSON.parse(imagesJson.replace(/&quot;/g, '"'));
        openImageGallery(images, 0);
      }
    });
  });
};

// Search filter function
function filterProducts(searchTerm) {
  const searchLower = searchTerm.toLowerCase().trim();

  if (!searchLower) {
    // Show all products if search is empty
    loadProducts();
    return;
  }

  const filteredProducts = allProducts.filter((product) => {
    const name = (product.name || "").toLowerCase();
    const desc = (product.description || "").toLowerCase();
    const price = (product.price || "").toString();

    return (
      name.includes(searchLower) ||
      desc.includes(searchLower) ||
      price.includes(searchLower)
    );
  });

  // Display filtered results
  container.innerHTML = "";

  if (filteredProducts.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <span class="no-results-emoji">🔍</span>
        <p>No products found for "<strong>${searchTerm}</strong>"</p>
        <p style="font-size: 14px; margin-top: 10px;">Try searching with different keywords</p>
      </div>
    `;
    return;
  }

  filteredProducts.forEach((data) => {
    const isSold = data.sold === true;

    let validImages = Array.isArray(data.imageUrls)
      ? data.imageUrls.filter(url => url && url.trim() !== '')
      : [];

    let mainImageHTML = "";

    if (validImages.length > 0) {
      const imageDataJson = JSON.stringify(validImages).replace(/"/g, '&quot;');

      mainImageHTML = `
        <div class="image-container" data-images="${imageDataJson}">
          <img src="${validImages[0]}" class="product-img" alt="${data.name || 'Product'}">
          ${validImages.length > 1 ? `<div class="image-counter">${validImages.length} photos</div>` : ''}
        </div>
      `;
    } else {
      mainImageHTML = `<div class="image-container"><div class="no-image">No image</div></div>`;
    }

    const productName = data.name || "Product";
    const productPrice = data.price || 0;

    const whatsappMessage = encodeURIComponent(
      `Hello, I'm interested in this product:\n\n📦 Product: ${productName}\n💰 Price: ₦${productPrice}\n\nPlease I would like to know more details.`
    );

    const whatsappLink = `https://wa.me/${OWNER_PHONE}?text=${whatsappMessage}`;

    container.innerHTML += `
      <div class="product ${isSold ? 'sold' : ''}">
        ${isSold ? `<div class="sold-badge">Sold</div>` : ''}
        ${mainImageHTML}

        <div class="product-info">
          <div>
            <div class="title">${productName}</div>
            <div class="price">₦${productPrice}</div>
          </div>

          <div class="desc">${data.description || ""}</div>

          ${
            isSold
              ? `<button class="order-btn" disabled>Sold Out</button>`
              : `
                <a
                  href="${whatsappLink}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="order-btn"
                  onclick="event.stopPropagation()"
                >
                  Order Now
                </a>
              `
          }
        </div>
      </div>
    `;
  });

  // Re-attach image gallery listeners
  document.querySelectorAll('.image-container').forEach((container) => {
    container.addEventListener('click', () => {
      const imagesJson = container.getAttribute('data-images');

      if (imagesJson) {
        const images = JSON.parse(imagesJson.replace(/&quot;/g, '"'));
        openImageGallery(images, 0);
      }
    });
  });
}

// Search event listener
searchBox.addEventListener('input', (e) => {
  filterProducts(e.target.value);
});

// Clear search button
clearSearchBtn.addEventListener('click', () => {
  searchBox.value = '';
  searchBox.focus();
  filterProducts('');
});
</script>
