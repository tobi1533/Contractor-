<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .product {
      width: 260px;
      padding: 10px;
      border: 1px solid #ddd;
      margin: 10px;
      display: inline-block;
      vertical-align: top;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2), 0 12px 24px rgba(0,0,0,0.15);
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .product:hover {
      transform: perspective(1000px) rotateX(5deg) rotateY(-8deg) translateZ(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 15px 35px rgba(0,0,0,0.2);
    }

    .product-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 5px;
      display: block;
    }

    .title {
      font-size: 18px;
      margin: 5px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
      color: #555;
    }
  </style>

</head>
<body>

<h2>Products</h2>

<div id="products"></div>

<script type="module">
import { db } from './firebase.js';
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const container = document.getElementById("products");

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    let imagesHTML = "";

    // ✅ SAFE CHECK FOR IMAGES
    if (Array.isArray(data.imageUrls) && data.imageUrls.length > 0) {
      data.imageUrls.forEach((url) => {
        if (url) {
          imagesHTML += `<img src="${url}" class="product-img">`;
        }
      });
    } else {
      imagesHTML = `<div style="padding:10px;color:#999;">No image</div>`;
    }

    container.innerHTML += `
      <div class="product">
        ${imagesHTML}
        <div class="title">${data.name || "No name"}</div>
        <div class="price">₦${data.price || 0}</div>
        <div class="desc">${data.description || ""}</div>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
