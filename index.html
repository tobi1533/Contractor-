<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <style>
    .product {
      width: 250px;
      padding: 10px;
      border: 1px solid #ddd;
      margin: 10px;
      display: inline-block;
      vertical-align: top;
    }

    .product-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>

</head>
<body>

<h2>Products</h2>
<div id="products"></div>

<script type="module">
import { db } from './firebase.js';
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const container = document.getElementById('products');

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));

  querySnapshot.forEach(doc => {
    const data = doc.data();

    container.innerHTML += `
      <div class="product">
        <img src="${data.imageUrls}" class="product-img" />
        <h3>${data.name}</h3>
        <p>₦${data.price}</p>
        <p>${data.description}</p>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
