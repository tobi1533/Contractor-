<!DOCTYPE html>
<html>
<head>
  <title>Private Luxury Market</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Exclusive Listings</h2>
  <div id="listings" class="grid"></div>
</div>

<script type="module">
querySnapshot.forEach(doc => {
  const data = doc.data();

  listingsDiv.innerHTML += `
    <div class="card">
      <img src="${data.image}" />
      <h3>${data.title}</h3>
      <p>${data.description}</p>

      <strong>₦${data.price}</strong>

      <br><br>

      <a href="https://wa.me/234XXXXXXXXXX">
        <button>Serious Buyer Only</button>
      </a>
    </div>
  `;
});
</script>

</body>
</html>
