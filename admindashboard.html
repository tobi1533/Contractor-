<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Montserrat;
  background:#f5f6ff;
  margin:0;
  padding:20px;
}

.container {
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.product {
  border:1px solid #eee;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  position:relative;
}

img {
  width:80px;
  height:80px;
  object-fit:cover;
  margin:5px;
  border-radius:6px;
}

.gallery {
  display:flex;
  flex-wrap:wrap;
}

/* SOLD BADGE */
.sold-badge {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  font-weight:bold;
  border-radius:6px;
  font-size:12px;
}

/* BUTTONS */
.actions button {
  margin-right:5px;
  margin-top:5px;
}

.sold-btn {
  background:#ff6b6b;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- UPLOAD -->
<div class="box">
<h2>Upload Product</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="images" multiple>

<div id="preview"></div>

<button id="uploadBtn">Upload</button>
</div>

<!-- PRODUCTS -->
<div class="box">
<h2>Products</h2>
<div id="list"></div>
</div>

</div>

<!-- EDIT BOX -->
<div id="editBox" class="box" style="display:none; position:fixed; top:10%; left:50%; transform:translateX(-50%); width:400px;">
<h3>Edit Product</h3>

<input id="e_name">
<input id="e_price">
<textarea id="e_desc"></textarea>

<input type="file" id="e_images" multiple>

<button id="saveEdit">Save</button>
<button onclick="document.getElementById('editBox').style.display='none'">Close</button>
</div>

<script type="module">

import { db } from './firebase.js';
import {
  collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUD_NAME = "dpaltarvh";
const UPLOAD_PRESET = "Tobifatai";

let editId = null;
let oldImages = [];

/* ================= CLOUDINARY ================= */
async function uploadImage(file){
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method:"POST", body:form }
  );

  const data = await res.json();
  return data.secure_url;
}

/* ================= PREVIEW ================= */
document.getElementById("images").onchange = (e)=>{
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  [...e.target.files].forEach(f=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  });
};

/* ================= UPLOAD ================= */
document.getElementById("uploadBtn").onclick = async ()=>{
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const desc = document.getElementById("desc").value;
  const files = images.files;

  if(!name || !price || !desc) return alert("Fill all fields");

  let urls = [];
  for(let f of files){
    urls.push(await uploadImage(f));
  }

  await addDoc(collection(db,"products"),{
    name,
    price,
    description:desc,
    imageUrls: urls,
    sold:false,
    createdAt:Date.now()
  });

  alert("Uploaded!");
  load();
};

/* ================= LOAD ================= */
async function load(){
  const list = document.getElementById("list");
  list.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"products"));
  list.innerHTML = "";

  snap.forEach(d=>{
    const p = d.data();

    const div = document.createElement("div");
    div.className="product";

    const soldBadge = p.sold
      ? `<div class="sold-badge">SOLD</div>`
      : "";

    div.innerHTML = `
      ${soldBadge}
      <b>${p.name}</b><br>
      ₦${p.price}<br>
      <p>${p.description}</p>

      <div class="gallery">
        ${(p.imageUrls||[]).map(u=>`<img src="${u}">`).join("")}
      </div>

      <div class="actions">

        <button onclick="edit('${d.id}')">Edit</button>

        <button onclick="del('${d.id}')">Delete</button>

        <button class="sold-btn" onclick="toggleSold('${d.id}', ${p.sold})">
          ${p.sold ? "Unmark Sold" : "Mark Sold"}
        </button>

      </div>
    `;

    list.appendChild(div);
  });
}

/* ================= DELETE ================= */
window.del = async (id)=>{
  await deleteDoc(doc(db,"products",id));
  load();
};

/* ================= TOGGLE SOLD ================= */
window.toggleSold = async (id, status)=>{
  await updateDoc(doc(db,"products",id),{
    sold: !status
  });
  load();
};

/* ================= EDIT ================= */
window.edit = async (id)=>{
  editId = id;

  const snap = await getDocs(collection(db,"products"));
  snap.forEach(d=>{
    if(d.id===id){
      const p = d.data();
      document.getElementById("e_name").value = p.name;
      document.getElementById("e_price").value = p.price;
      document.getElementById("e_desc").value = p.description;
      oldImages = p.imageUrls || [];
    }
  });

  document.getElementById("editBox").style.display="block";
};

/* ================= SAVE EDIT ================= */
document.getElementById("saveEdit").onclick = async ()=>{
  const name = e_name.value;
  const price = e_price.value;
  const desc = e_desc.value;
  const files = e_images.files;

  let newImages = [...oldImages];

  for(let f of files){
    newImages.push(await uploadImage(f));
  }

  await updateDoc(doc(db,"products",editId),{
    name,
    price,
    description:desc,
    imageUrls:newImages
  });

  alert("Updated!");
  document.getElementById("editBox").style.display="none";
  load();
};

load();

</script>

</body>
</html>
