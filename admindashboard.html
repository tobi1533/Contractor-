<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Montserrat;
  background:#f5f6ff;
  margin:0;
  padding:20px;
}

.container {
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  box-sizing: border-box;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* =========================
   UPLOAD PROGRESS SECTION
========================= */

.upload-section {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 2px solid #eee;
}

.progress-container {
  display: none;
  background: #f9f9f9;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
}

.progress-container.active {
  display: block;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-label {
  font-weight: 600;
  color: #333;
  font-size: 14px;
}

.progress-percent {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
  font-size: 14px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 10px;
}

.file-info {
  font-size: 12px;
  color: #666;
  margin-top: 8px;
}

.status-message {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
}

.status-uploading {
  background: #e3f2fd;
  color: #1976d2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.status-uploading::before {
  content: '';
  width: 12px;
  height: 12px;
  border: 2px solid #1976d2;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.status-success {
  background: #e8f5e9;
  color: #388e3c;
}

.status-success::before {
  content: '✓';
  margin-right: 5px;
  font-weight: bold;
}

.status-error {
  background: #ffebee;
  color: #c62828;
}

.status-error::before {
  content: '✕';
  margin-right: 5px;
  font-weight: bold;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* =========================
   UPDATED LIST VIEW LAYOUT
========================= */

.product {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;

  border: 1px solid #eee;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  position: relative;

  background: white;
}

/* SOLD BADGE */
.sold-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  background: red;
  color: white;
  padding: 3px 6px;
  font-size: 10px;
  border-radius: 4px;
}

/* IMAGE STRIP */
.gallery {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  max-width: 140px;
  overflow-x: auto;
}

.gallery img {
  width: 45px;
  height: 45px;
  object-fit: cover;
  border-radius: 6px;
}

/* TEXT */
.product b {
  display: block;
  font-size: 14px;
}

.product p {
  margin: 4px 0;
  font-size: 12px;
  color: #555;
}

.price {
  font-weight: 600;
  color: #333;
  font-size: 13px;
}

/* ACTIONS RIGHT SIDE */
.actions {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}

.actions button {
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 6px;
}

.sold-btn {
  background:#ff6b6b;
  color:white;
}

.upload-btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  width: 100%;
  padding: 12px;
  font-size: 14px;
  margin-top: 10px;
}

.upload-btn:hover {
  opacity: 0.9;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
  transition: all 0.3s ease;
}

.upload-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
</style>
</head>

<body>

<div class="container">

<!-- UPLOAD -->
<div class="box">
<h2>Upload Product</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="images" multiple accept="image/*,video/*">

<div id="preview" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>

<!-- Progress Section -->
<div class="upload-section">
  <div id="progressContainer" class="progress-container">
    <div class="progress-header">
      <span class="progress-label">Uploading Files</span>
      <span class="progress-percent"><span id="progressPercent">0</span>%</span>
    </div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="file-info">
      <span id="fileInfo">0 / 0 files</span>
    </div>
    <div id="statusMessage" class="status-message status-uploading">
      Preparing upload...
    </div>
  </div>
</div>

<button id="uploadBtn" class="upload-btn">Upload Product</button>
</div>

<!-- PRODUCTS -->
<div class="box">
<h2>Products</h2>
<div id="list"></div>
</div>

</div>

<!-- EDIT BOX -->
<div id="editBox" class="box" style="display:none; position:fixed; top:10%; left:50%; transform:translateX(-50%); width:400px; max-height: 80vh; overflow-y: auto; z-index: 1000;">
<h3>Edit Product</h3>

<input id="e_name" placeholder="Product Name">
<input id="e_price" placeholder="Price">
<textarea id="e_desc" placeholder="Description"></textarea>

<input type="file" id="e_images" multiple accept="image/*,video/*">

<div id="e_preview" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>

<!-- Edit Progress Section -->
<div class="upload-section">
  <div id="editProgressContainer" class="progress-container">
    <div class="progress-header">
      <span class="progress-label">Updating Images</span>
      <span class="progress-percent"><span id="editProgressPercent">0</span>%</span>
    </div>
    <div class="progress-bar">
      <div id="editProgressFill" class="progress-fill"></div>
    </div>
    <div class="file-info">
      <span id="editFileInfo">0 / 0 files</span>
    </div>
    <div id="editStatusMessage" class="status-message status-uploading">
      Preparing upload...
    </div>
  </div>
</div>

<button id="saveEdit" style="width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-top: 10px;">Save Changes</button>
<button onclick="document.getElementById('editBox').style.display='none'" style="width: 100%; background: #ccc; margin-top: 5px;">Cancel</button>
</div>

<script type="module">

import { db } from './firebase.js';
import {
  collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUD_NAME = "dpaltarvh";
const UPLOAD_PRESET = "Tobifatai";

let editId = null;
let oldImages = [];

/* ================= PROGRESS HELPERS ================= */
function showProgress(container, label = "Uploading") {
  container.classList.add("active");
  const statusMsg = container.querySelector(".status-message");
  statusMsg.textContent = label;
  statusMsg.className = "status-message status-uploading";
}

function hideProgress(container) {
  container.classList.remove("active");
}

function updateProgress(container, current, total, percent) {
  const progressFill = container.querySelector(".progress-fill");
  const progressPercent = container.querySelector(".progress-percent span");
  const fileInfo = container.querySelector(".file-info span");
  
  progressFill.style.width = percent + "%";
  progressPercent.textContent = Math.round(percent);
  fileInfo.textContent = `${current} / ${total} files`;
}

function setStatus(container, message, type) {
  const statusMsg = container.querySelector(".status-message");
  statusMsg.textContent = message;
  statusMsg.className = `status-message status-${type}`;
}

/* ================= CLOUDINARY ================= */
async function uploadImage(file, progressCallback){
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);
  
  // Set resource type for videos
  if (file.type.startsWith('video/')) {
    form.append("resource_type", "video");
  }

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();

    // Track upload progress
    xhr.upload.addEventListener("progress", (e) => {
      if (e.lengthComputable) {
        const percent = (e.loaded / e.total) * 100;
        if (progressCallback) progressCallback(percent);
      }
    });

    xhr.addEventListener("load", () => {
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        resolve(data.secure_url);
      } else {
        reject(new Error("Upload failed"));
      }
    });

    xhr.addEventListener("error", () => {
      reject(new Error("Upload error"));
    });

    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`);
    xhr.send(form);
  });
}

/* ================= PREVIEW ================= */
document.getElementById("images").onchange = (e)=>{
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  [...e.target.files].forEach(f=>{
    const isVideo = f.type.startsWith('video/');
    
    if (isVideo) {
      const video = document.createElement("div");
      video.style.position = "relative";
      video.style.width = "80px";
      video.style.height = "80px";
      
      const videoElement = document.createElement("video");
      videoElement.src = URL.createObjectURL(f);
      videoElement.style.width = "80px";
      videoElement.style.height = "80px";
      videoElement.style.objectFit = "cover";
      videoElement.style.borderRadius = "8px";
      
      const badge = document.createElement("div");
      badge.innerHTML = "🎥";
      badge.style.position = "absolute";
      badge.style.top = "4px";
      badge.style.right = "4px";
      badge.style.background = "rgba(0,0,0,0.7)";
      badge.style.color = "white";
      badge.style.padding = "2px 4px";
      badge.style.borderRadius = "4px";
      badge.style.fontSize = "12px";
      
      video.appendChild(videoElement);
      video.appendChild(badge);
      preview.appendChild(video);
    } else {
      const img = document.createElement("img");
      img.src = URL.createObjectURL(f);
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.objectFit = "cover";
      img.style.borderRadius = "8px";
      preview.appendChild(img);
    }
  });
};

document.getElementById("e_images").onchange = (e)=>{
  const preview = document.getElementById("e_preview");
  preview.innerHTML = "";
  [...e.target.files].forEach(f=>{
    const isVideo = f.type.startsWith('video/');
    
    if (isVideo) {
      const video = document.createElement("div");
      video.style.position = "relative";
      video.style.width = "80px";
      video.style.height = "80px";
      
      const videoElement = document.createElement("video");
      videoElement.src = URL.createObjectURL(f);
      videoElement.style.width = "80px";
      videoElement.style.height = "80px";
      videoElement.style.objectFit = "cover";
      videoElement.style.borderRadius = "8px";
      
      const badge = document.createElement("div");
      badge.innerHTML = "🎥";
      badge.style.position = "absolute";
      badge.style.top = "4px";
      badge.style.right = "4px";
      badge.style.background = "rgba(0,0,0,0.7)";
      badge.style.color = "white";
      badge.style.padding = "2px 4px";
      badge.style.borderRadius = "4px";
      badge.style.fontSize = "12px";
      
      video.appendChild(videoElement);
      video.appendChild(badge);
      preview.appendChild(video);
    } else {
      const img = document.createElement("img");
      img.src = URL.createObjectURL(f);
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.objectFit = "cover";
      img.style.borderRadius = "8px";
      preview.appendChild(img);
    }
  });
};

/* ================= UPLOAD ================= */
document.getElementById("uploadBtn").onclick = async ()=>{
  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const files = document.getElementById("images").files;

  if(!name || !price || !desc) {
    alert("Please fill all fields");
    return;
  }

  if(files.length === 0) {
    alert("Please select at least one image");
    return;
  }

  const uploadBtn = document.getElementById("uploadBtn");
  const progressContainer = document.getElementById("progressContainer");

  uploadBtn.disabled = true;
  showProgress(progressContainer, "Starting upload...");

  try {
    let urls = [];
    let completed = 0;

    for(let i = 0; i < files.length; i++){
      const f = files[i];
      
      setStatus(progressContainer, `Uploading file ${i + 1} of ${files.length}...`, "uploading");
      updateProgress(progressContainer, completed, files.length, (completed / files.length) * 100);

      const url = await uploadImage(f, (filePercent) => {
        const totalPercent = ((completed + (filePercent / 100)) / files.length) * 100;
        updateProgress(progressContainer, completed + 1, files.length, totalPercent);
      });

      urls.push(url);
      completed++;
      updateProgress(progressContainer, completed, files.length, (completed / files.length) * 100);
    }

    setStatus(progressContainer, "Creating product...", "uploading");

    await addDoc(collection(db,"products"),{
      name,
      price,
      description:desc,
      imageUrls: urls,
      sold:false,
      createdAt:Date.now()
    });

    setStatus(progressContainer, "Product uploaded successfully!", "success");
    
    setTimeout(() => {
      hideProgress(progressContainer);
      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("images").value = "";
      document.getElementById("preview").innerHTML = "";
      uploadBtn.disabled = false;
      load();
    }, 2000);

  } catch(error) {
    console.error("Upload error:", error);
    setStatus(progressContainer, `Error: ${error.message}`, "error");
    uploadBtn.disabled = false;
  }
};

/* ================= LOAD ================= */
async function load(){
  const list = document.getElementById("list");
  list.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"products"));
  list.innerHTML = "";

  snap.forEach(d=>{
    const p = d.data();

    const div = document.createElement("div");
    div.className="product";

    const soldBadge = p.sold
      ? `<div class="sold-badge">SOLD</div>`
      : "";

    div.innerHTML = `
      ${soldBadge}

      <div class="gallery">
        ${(p.imageUrls||[]).map(u=>{
          const isVideo = u.includes('.mp4') || u.includes('video') || u.includes('/v') && u.includes('.') && !u.includes('.jpg') && !u.includes('.png') && !u.includes('.gif');
          if (isVideo) {
            return `<div style="position:relative;width:45px;height:45px;border-radius:6px;overflow:hidden;"><video src="${u}" style="width:100%;height:100%;object-fit:cover;"></video><div style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:white;padding:2px 3px;border-radius:3px;font-size:10px;">🎥</div></div>`;
          }
          return `<img src="${u}">`;
        }).join("")}
      </div>

      <div>
        <b>${p.name}</b>
        <div class="price">₦${p.price}</div>
        <p>${p.description}</p>
      </div>

      <div class="actions">
        <button onclick="edit('${d.id}')" style="background: #667eea; color: white;">Edit</button>
        <button onclick="del('${d.id}')" style="background: #ff6b6b; color: white;">Delete</button>
        <button class="sold-btn" onclick="toggleSold('${d.id}', ${p.sold})">
          ${p.sold ? "Unmark Sold" : "Mark Sold"}
        </button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* ================= DELETE ================= */
window.del = async (id)=>{
  if(confirm("Are you sure you want to delete this product?")) {
    await deleteDoc(doc(db,"products",id));
    load();
  }
};

/* ================= TOGGLE SOLD ================= */
window.toggleSold = async (id, status)=>{
  await updateDoc(doc(db,"products",id),{
    sold: !status
  });
  load();
};

/* ================= EDIT ================= */
window.edit = async (id)=>{
  editId = id;

  const snap = await getDocs(collection(db,"products"));
  snap.forEach(d=>{
    if(d.id===id){
      const p = d.data();
      document.getElementById("e_name").value = p.name;
      document.getElementById("e_price").value = p.price;
      document.getElementById("e_desc").value = p.description;
      oldImages = p.imageUrls || [];
    }
  });

  document.getElementById("editBox").style.display="block";
};

/* ================= SAVE EDIT ================= */
document.getElementById("saveEdit").onclick = async ()=>{
  const name = document.getElementById("e_name").value.trim();
  const price = document.getElementById("e_price").value.trim();
  const desc = document.getElementById("e_desc").value.trim();
  const files = document.getElementById("e_images").files;

  if(!name || !price || !desc) {
    alert("Please fill all fields");
    return;
  }

  const saveBtn = document.getElementById("saveEdit");
  const progressContainer = document.getElementById("editProgressContainer");

  saveBtn.disabled = true;

  try {
    let newImages = [...oldImages];

    if(files.length > 0) {
      showProgress(progressContainer, "Uploading new images...");
      let completed = 0;

      for(let i = 0; i < files.length; i++){
        const f = files[i];
        
        setStatus(progressContainer, `Uploading image ${i + 1} of ${files.length}...`, "uploading");
        updateProgress(progressContainer, completed, files.length, (completed / files.length) * 100);

        const url = await uploadImage(f, (filePercent) => {
          const totalPercent = ((completed + (filePercent / 100)) / files.length) * 100;
          updateProgress(progressContainer, completed + 1, files.length, totalPercent);
        });

        newImages.push(url);
        completed++;
        updateProgress(progressContainer, completed, files.length, (completed / files.length) * 100);
      }
    }

    setStatus(progressContainer, "Saving changes...", "uploading");

    await updateDoc(doc(db,"products",editId),{
      name,
      price,
      description:desc,
      imageUrls:newImages
    });

    setStatus(progressContainer, "Product updated successfully!", "success");
    
    setTimeout(() => {
      hideProgress(progressContainer);
      document.getElementById("editBox").style.display="none";
      document.getElementById("e_images").value = "";
      document.getElementById("e_preview").innerHTML = "";
      saveBtn.disabled = false;
      load();
    }, 2000);

  } catch(error) {
    console.error("Update error:", error);
    setStatus(progressContainer, `Error: ${error.message}`, "error");
    saveBtn.disabled = false;
  }
};

load();

</script>

</body>
</html>
